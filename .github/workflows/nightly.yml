name: Nightly Tests

# The Clojure suite is expensive, so it does NOT run per-commit. It runs here on
# a schedule (and on the release path in release.yml). This catches master
# drifting red between releases without paying the cost on every push.
#
# Notification: GitHub emails the repository owner automatically when a
# SCHEDULED workflow run fails, so no extra notify step is needed. Wire a Slack
# / webhook step under `if: failure()` later if you want louder alerts.
#
# Cost guard: the cheap `check` job below gates the expensive suite on "did
# master move since the last nightly?". Cron can't be made conditional, so we
# still spin up a few-second runner nightly, but the ~3-minute Clojure suite
# only runs when there's a fresh commit. A skipped suite reports the run as
# success (skipped jobs don't fail a run), so quiet nights stay green and
# silent. `workflow_dispatch` always runs the suite regardless of commit age.
# The window is intentionally ~26h (not 24h) to absorb GitHub's schedule jitter
# — a false skip (missing a commit) is worse than an occasional redundant run.

on:
  schedule:
    # 07:00 UTC daily (~02:00-03:00 US Eastern). Cron uses UTC.
    - cron: '0 7 * * *'
  workflow_dispatch:   # allow manual "run now" from the Actions tab

permissions:
  contents: read

jobs:
  # Cheap gate: skip the suite on nights where master hasn't moved.
  check:
    runs-on: ubuntu-latest
    outputs:
      recent: ${{ steps.check.outputs.recent }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        name: Commit since the last nightly?
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          age_h=$(( (now - last) / 3600 ))
          if [ $(( now - last )) -lt 93600 ]; then   # ~26h window
            echo "Last commit ${age_h}h ago — running suite."
            echo "recent=true" >> "$GITHUB_OUTPUT"
          else
            echo "Last commit ${age_h}h ago — no changes since last nightly, skipping suite."
            echo "recent=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check
    if: needs.check.outputs.recent == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
          bb: latest
      - name: Cache Maven + gitlibs
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-cljdeps-${{ hashFiles('plaid-core/deps.edn') }}
          restore-keys: ${{ runner.os }}-cljdeps-
      # `bb test` == `clojure -M:test` in plaid-core — shared with release.yml
      # and local dev (bb/pipeline.clj), so the gate can't drift.
      - name: Run tests
        run: bb test
