# slf4j-simple — third-party LIBRARY log stream (HikariCP, SQLite driver,
# HTTP server, Tika, anything routed through SLF4J or clojure.tools.logging).
#
# Plaid's OWN code logs through Timbre, not this. The two streams are made to
# look alike on purpose (same timestamp + bracketed level + logger), so the
# console reads as one log even though two backends produce it.
#
# These are static FORMAT defaults. The level and destination are normally
# overridden at startup from config.toml ([logging] library_level / file) via
# system properties — see plaid.server.config/configure-logging!. They are
# repeated here only as a safe fallback for the (unusual) case where a library
# logger initializes before config is applied, and because slf4j-simple reads
# each property exactly once at init.
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.logFile=System.out
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.levelInBrackets=true
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=false
