# =============================================================================
# Plaid server configuration
# =============================================================================
#
# This file is written automatically to data/config.toml on first launch with
# every setting set to its default. Edit it and restart the server to apply
# changes. Settings left out of this file fall back to the defaults shown here,
# so you can delete anything you don't want to override.
#
# To load config from a different location, pass `--config /path/to/config.toml`
# on the command line, or set the PLAID_CONFIG environment variable.
#
# NOTE: the JWT signing secret is NOT configured here. It is read from the
# PLAID_JWT_SECRET environment variable, or auto-generated into
# data/jwt-secret.txt (owner-only permissions) on first launch.

# -----------------------------------------------------------------------------
# HTTP server
# -----------------------------------------------------------------------------
[server]
# Port the HTTP API listens on.
port = 8080

# Maximum size (in megabytes) of a non-multipart request body (e.g. JSON/EDN
# REST payloads). Multipart media uploads are capped separately by
# [media] max_file_size_mb.
max_json_body_mb = 10

# Serve static files from this filesystem directory (UNAUTHENTICATED —
# anything under it becomes public). Disabled unless set; the bundled
# /ud and /igt apps are served from the jar regardless. Advanced; most
# deployments never set this.
# static_resources_path = "/srv/plaid-static"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
[logging]
# Minimum log level for Plaid's OWN code. One of:
# trace, debug, info, warn, error, fatal, report.
# At "info" you get one line per HTTP request (method, path, status, timing)
# plus startup/shutdown; warnings and errors always surface. Use "debug" to
# additionally see full request/response bodies (sensitive fields redacted)
# and other granular detail.
level = "info"

# Log level for THIRD-PARTY libraries (database connection pool, SQLite driver,
# HTTP server, file-type detection, ...). These are chatty at "info", so the
# default keeps them quiet unless something needs attention. Raise to
# "info"/"debug" when diagnosing a library-level problem. Applied once at
# startup — changing it needs a restart.
library_level = "warn"

# Write logs to a FILE (rotated daily; previous days kept as "<file>.YYYYMMDD")
# instead of stdout. Leave commented to log to stdout — recommended when running
# under systemd or Docker, which capture and rotate stdout for you.
# file = "data/plaid.log"

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------
[auth]
# Session token (JWT) lifetime, in seconds. Default is 30 days (2592000).
# Shorten for tighter-security deployments.
jwt_ttl_seconds = 2592000

# -----------------------------------------------------------------------------
# API surface
# -----------------------------------------------------------------------------
[api]
# Whether to expose the auto-generated OpenAPI spec at /api/v1/openapi.json.
# Set to false to reduce surface area on hardened deployments.
expose_openapi = true

# -----------------------------------------------------------------------------
# Media uploads
# -----------------------------------------------------------------------------
[media]
# Maximum size (in megabytes) of a single uploaded media file.
max_file_size_mb = 200

# -----------------------------------------------------------------------------
# Database (SQLite)
# -----------------------------------------------------------------------------
[database]
# Path to the SQLite database file. Created (with its parent directory) on
# first launch if absent.
#
# BACKUPS: the database runs in WAL mode, so a plain file copy of the .db
# misses un-checkpointed writes in the -wal sidecar. Use the SQLite backup
# API instead — safe with the server running:
#   sqlite3 data/plaid.db ".backup /path/to/backup-$(date +%F).db"
path = "data/plaid.db"

# Minimum / maximum allowed length for user-supplied names (projects, layers,
# documents, etc.).
min_name_length = 1
max_name_length = 500

# Queries slower than this many milliseconds are logged. Uncomment to override
# (default 500).
# slow_query_threshold_ms = 500

# --- Connection pool + SQLite PRAGMA tuning (advanced) -----------------------
# Uncomment and adjust any of these to override the defaults.
# max_pool_size = 10            # HikariCP maximum pool size
# connection_timeout_ms = 30000 # HikariCP connection timeout
# busy_timeout_ms = 5000        # SQLite busy_timeout PRAGMA
# journal_mode = "WAL"          # SQLite journal_mode PRAGMA
# synchronous = "NORMAL"        # SQLite synchronous PRAGMA

# -----------------------------------------------------------------------------
# CORS (cross-origin requests)
# -----------------------------------------------------------------------------
# By default no cross-origin requests are allowed: frontends must be served
# from the same origin as the API.
[cors]
# Exact origin strings to allow (NOT regexes), e.g.
#   allowed_origins = ["https://app.example.com", "https://staging.example.com"]
# Each entry is anchored and matched exactly. Empty list = same-origin only.
allowed_origins = []

# HTTP methods permitted for cross-origin requests.
allowed_methods = ["get", "put", "post", "patch", "delete", "options"]

# Request headers permitted for cross-origin requests.
allowed_headers = ["Authorization", "Content-Type"]

# -----------------------------------------------------------------------------
# Document locks
# -----------------------------------------------------------------------------
[locks]
# How long (milliseconds) a document lock is held before it expires.
expiration_ms = 60000

# -----------------------------------------------------------------------------
# Real-time events (SSE)
# -----------------------------------------------------------------------------
[events]
# Heartbeat interval (milliseconds) for server-sent-event streams.
heartbeat_interval_ms = 30000
# Number of consecutive missed heartbeats before a client is dropped.
heartbeat_max_misses = 2
